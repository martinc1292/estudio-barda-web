<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>render</title>
<style>body{margin:0;background:#222;color:#fff;font-family:monospace}canvas{display:block;margin:10px auto;background:#fff;max-width:100%}.lbl{padding:4px 10px}</style>
</head><body>
<div id="status" class="lbl">loading…</div>
<div id="out"></div>
<script type="module">
import * as pdfjs from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs';
pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs';
const status = document.getElementById('status');
const out = document.getElementById('out');
try {
  status.textContent = 'fetching pdf...';
  const resp = await fetch('manual.pdf');
  const buf = await resp.arrayBuffer();
  status.textContent = 'parsing pdf...';
  const pdf = await pdfjs.getDocument({ data: new Uint8Array(buf) }).promise;
  status.textContent = `pages: ${pdf.numPages}`;
  const targets = [8, 9, 10, 11, 17, 18];
  for (const p of targets) {
    const page = await pdf.getPage(p);
    const viewport = page.getViewport({ scale: 1.5 });
    const c = document.createElement('canvas');
    c.width = viewport.width; c.height = viewport.height;
    c.dataset.page = p;
    out.appendChild(c);
    const lbl = document.createElement('div'); lbl.className='lbl'; lbl.textContent='page '+p; out.insertBefore(lbl, c);
    await page.render({ canvasContext: c.getContext('2d'), viewport }).promise;
  }
  status.textContent = 'done';
  window.__done = true;
} catch (e) {
  status.textContent = 'err: ' + e.message;
  console.error(e);
}
</script>
</body></html>
